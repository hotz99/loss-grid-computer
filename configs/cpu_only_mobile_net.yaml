experiment_name: cpu-only
seed: 1337
backend: hybrid
data:
  name: cifar10
  root: assets/cifar-10-batches-py
  split: test
  subset_size: 256
  num_workers: 0
  num_classes: 10
  normalize_mean: [0.4914, 0.4822, 0.4465]
  normalize_std: [0.2470, 0.2435, 0.2616]
grid:
  alpha_min: -1.0
  alpha_max: 1.0
  beta_min: -1.0
  beta_max: 1.0
  resolution: 17
runtime:
  device: cpu
  precision: fp32
  num_batches: null
  output_root: outputs
  output_formats: [csv]
decomposition:
  cpu_schedule: static
  cpu_chunk_size: 1
  cpu_threads_per_worker: 1
sweep:
  backend: [hybrid]
  model.name: [mobilenet_v3_small]
  data.batch_size: [8, 16, 32, 64]
  decomposition.cpu_schedule: [static]
  resources.cpu_workers: [0, 1, 2, 4, 10]
